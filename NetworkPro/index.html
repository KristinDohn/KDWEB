function ImportView({onImport, onNavigate}) {
  const [step, setStep] = React.useState("guide"); // guide | pick | review
  const [parsed, setParsed] = React.useState([]);
  const [selected, setSelected] = React.useState({});
  const [importing, setImporting] = React.useState(false);
  const [doneCount, setDoneCount] = React.useState(0);
  const fileRef = React.useRef();

  function parseVCF(text) {
    const contacts = [];
    const cards = text.split(/BEGIN:VCARD/i).filter(c => c.trim());
    for (const card of cards) {
      // Use line-start match to avoid "N" matching "FN" or "VERSION"
      const getField = (field) => {
        const m = card.match(new RegExp('(?:^|\n)' + field + '(?:[;:][^\n]*)?:([^\r\n]+)', 'im'));
        return m ? m[1].trim() : '';
      };
      const fnLine = getField('FN');
      const nRaw   = getField('N');
      const emailLine = getField('EMAIL');
      const phoneLine = getField('TEL');
      const orgLine   = getField('ORG');
      let firstName = '', lastName = '';
      if (nRaw) {
        const parts = nRaw.split(';');
        lastName  = (parts[0] || '').trim();
        firstName = (parts[1] || '').trim();
      }
      if ((!firstName && !lastName) && fnLine) {
        const fp = fnLine.split(' ');
        firstName = fp[0] || '';
        lastName  = fp.slice(1).join(' ');
      }
      if (!firstName && !lastName) continue;
      // Format phone to (xxx) xxx-xxxx
      const rawPhone = phoneLine.replace(/^[^:]*:/, '').trim();
      const digits = rawPhone.replace(/\D/g, '');
      let phone = rawPhone;
      if (digits.length === 11 && digits[0] === '1') {
        phone = '(' + digits.slice(1,4) + ') ' + digits.slice(4,7) + '-' + digits.slice(7);
      } else if (digits.length === 10) {
        phone = '(' + digits.slice(0,3) + ') ' + digits.slice(3,6) + '-' + digits.slice(6);
      }
      contacts.push({
        firstName,
        lastName,
        email: emailLine.replace(/^[^:]*:/, '').trim() || '',
        phone,
